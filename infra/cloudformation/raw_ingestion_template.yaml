AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Raw-ingestion Lambda MVP for Peru construction data.

Parameters:
  SourceName:
    Type: String
    Default: peru-open-data
  # This stack writes into an existing shared raw/bronze bucket instead of
  # creating a service-specific bucket. That keeps storage lifecycle separate
  # from one Lambda stack and makes reuse across services easier.
  RawBucketName:
    Type: String
    Default: bronze-rmm
  RawPrefix:
    Type: String
    Default: raw
  RequestTimeout:
    Type: Number
    Default: 30
  StorageBackend:
    Type: String
    Default: s3
    AllowedValues:
      - s3
      - filesystem
  LocalOutputDir:
    Type: String
    Default: .sam-local-output

Resources:
  RawIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-raw-ingestion"
      # Package only the application directory so docs, learning notes, and
      # exploration files do not get bundled into the Lambda artifact.
      CodeUri: ../../app
      Handler: lambda_app.handler.lambda_handler
      Runtime: python3.14
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          RAW_BUCKET_NAME: !Ref RawBucketName
          RAW_PREFIX: !Ref RawPrefix
          SOURCE_NAME: !Ref SourceName
          REQUEST_TIMEOUT: !Ref RequestTimeout
          STORAGE_BACKEND: !Ref StorageBackend
          LOCAL_OUTPUT_DIR: !Ref LocalOutputDir
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: WriteRawObjects
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "arn:${AWS::Partition}:s3:::${RawBucketName}/*"

Outputs:
  RawIngestionFunctionName:
    Description: Name of the raw-ingestion Lambda function.
    Value: !Ref RawIngestionFunction
  RawBucketName:
    Description: Name of the shared raw-ingestion S3 bucket.
    Value: !Ref RawBucketName
