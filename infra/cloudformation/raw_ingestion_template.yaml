AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Raw-ingestion Lambda MVP for Peru construction data.

Parameters:
  SourceName:
    Type: String
    Default: peru-open-data
  RawPrefix:
    Type: String
    Default: raw
  RequestTimeout:
    Type: Number
    Default: 30
  StorageBackend:
    Type: String
    Default: s3
    AllowedValues:
      - s3
      - filesystem
  LocalOutputDir:
    Type: String
    Default: .sam-local-output

Resources:
  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  RawIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-raw-ingestion"
      CodeUri: ../../
      Handler: app.lambda_app.handler.lambda_handler
      Runtime: python3.14
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          RAW_BUCKET_NAME: !Ref RawBucket
          RAW_PREFIX: !Ref RawPrefix
          SOURCE_NAME: !Ref SourceName
          REQUEST_TIMEOUT: !Ref RequestTimeout
          STORAGE_BACKEND: !Ref StorageBackend
          LOCAL_OUTPUT_DIR: !Ref LocalOutputDir
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Sid: WriteRawObjects
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${RawBucket.Arn}/*"

Outputs:
  RawIngestionFunctionName:
    Description: Name of the raw-ingestion Lambda function.
    Value: !Ref RawIngestionFunction
  RawBucketName:
    Description: Name of the raw-ingestion S3 bucket.
    Value: !Ref RawBucket
